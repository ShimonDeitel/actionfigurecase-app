name: Action Figure Case
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Action Figure Case:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Action Figure Case
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.actionfigurecase
        INFOPLIST_FILE: Action Figure Case/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
    info:
      path: Action Figure Case/Info.plist
      properties:
        CFBundleDisplayName: Action Figure Case
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  Action Figure CaseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Action Figure CaseTests
    dependencies:
      - target: Action Figure Case
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.actionfigurecase.tests
  Action Figure CaseUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Action Figure CaseUITests
    dependencies:
      - target: Action Figure Case
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.actionfigurecase.uitests
schemes:
  Action Figure Case:
    build:
      targets:
        Action Figure Case: all
    test:
      targets:
        - Action Figure CaseTests
        - Action Figure CaseUITests
    run:
      config: Debug
    archive:
      config: Release
